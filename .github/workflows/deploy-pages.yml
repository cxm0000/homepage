name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - name: Resolve Vite base path
        run: |
          if [ -n "${{ vars.BASE_PATH }}" ]; then
            BASE_PATH="${{ vars.BASE_PATH }}"
          elif [ -f public/CNAME ] || [ -f CNAME ]; then
            # Custom domain at site root (see public/CNAME) — not /repo-name/ on github.io
            BASE_PATH="/"
          elif [ -n "${{ vars.PUBLIC_SITE_URL }}" ] && [[ "${{ vars.PUBLIC_SITE_URL }}" != *".github.io/"* ]]; then
            BASE_PATH="/"
          else
            BASE_PATH="/${{ github.event.repository.name }}/"
          fi
          case "$BASE_PATH" in
            */) ;;
            *) BASE_PATH="${BASE_PATH}/" ;;
          esac
          echo "BASE_PATH=$BASE_PATH" >> "$GITHUB_ENV"
          echo "Using BASE_PATH=$BASE_PATH"
      - name: Build
        run: npm run build
        env:
          # Optional repo Variable `PUBLIC_SITE_URL` (no trailing slash) — canonical + og:image; also selects `/` base for non-github.io URLs
          VITE_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      - name: Verify production bundle
        run: |
          test -f dist/index.html
          test -f dist/CNAME
          grep -qE 'src="[^"]*assets/' dist/index.html
          ! grep -q 'main.tsx' dist/index.html
          if [ -f public/CNAME ]; then
            ! grep -q '/${{ github.event.repository.name }}/' dist/index.html
          fi
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
